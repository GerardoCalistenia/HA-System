{% extends "base.html" %}

{% block content %}
<h2>Renovar membresía</h2>

<p><strong>Alumno:</strong> {{ alumno.nombres }} {{ alumno.apellidos }}</p>
<p><strong>Fecha de vencimiento actual:</strong> {{ alumno.fecha_vencimiento }}</p>

<form method="POST">
    {% csrf_token %}
    <label>Meses a pagar:</label>
    <input type="number" name="meses_pagados" min="1" max="12" required>

    <br><br>
    <button type="submit">Renovar</button>
</form>

<br>
<a href="{% url 'lista_renovar' %}">Volver</a>

{% endblock %}
