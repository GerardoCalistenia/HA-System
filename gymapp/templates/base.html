<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gimnasio</title>

    {% load static %}

    <style>
        /* Forzar tema oscuro SIEMPRE */
        html {
            color-scheme: dark;
            background: #000;
        }

        body {
            font-family: Arial, sans-serif;
            color: #f1f1f1;
            margin: 0;
            padding: 15px;
            position: relative;
            z-index: 1;
        }

        /* FONDO REAL (NO SE CORTA) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: -1;

            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)),
            url("{% static 'images/la_ha.jpg' %}") no-repeat center center;
            background-size: cover;
        }


        .top-bar {
            text-align: right;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ccc;
        }

        .container {
            width: 100%;
            padding: 10px 0;
        }

        /* ============================
        FORMULARIOS
        ============================ */
        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            border: 1px solid #333;
            font-size: 16px;
            background: #111;
            color: #f1f1f1;
        }

        input::placeholder,
        textarea::placeholder {
            color: #777;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        a {
            color: #4da3ff;
            text-decoration: none;
            margin-top: 10px;
            display: inline-block;
        }

        /* ============================
        TABLAS OSCURAS
        ============================ */
        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            min-width: 600px;
            border-collapse: collapse;

            /* GLASS REAL */
            background: rgba(20, 20, 20, .01);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);

            border-radius: 12px;
            overflow: hidden;

            box-shadow:
                0 8px 30px rgba(0, 0, 0, 0.7),
                inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }


        th,
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            text-align: left;
            white-space: nowrap;
            color: #eaeaea;
        }

        th {
            background: #111;
            color: #fff;
        }

        tr {
            background: transparent;
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.04);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .table-link {
            color: #4da3ff;
            font-weight: bold;
        }

        /* ===== MENÚ PRINCIPAL ===== */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-link {
            display: block;
            text-align: center;
            background: #007bff;
            color: white !important;
            padding: 14px;
            font-size: 18px;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn-link:hover {
            background: #0056b3;
        }

        .btn-logout {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-logout:hover {
            background: #a71d2a;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        Fecha actual: {{ fecha_actual }}
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
